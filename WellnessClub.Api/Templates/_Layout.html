<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{Title}}</title>
  <link rel="icon" type="image/png" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-teal: #134B5F;
      --brand-green: #00AA75;
      --brand-green-dark: #00885E;
      --text: #303131;
      --text-muted: #797A7A;
      --border: #F2F4F3;
      --card-tint: #F9FAF9;
      --page-bg: #EEF2F4;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); min-height: 100vh; margin: 0; background: var(--page-bg); padding: 1rem; }
    .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.06); width: 100%; max-width: 640px; margin: 2rem auto; }
    .card.wide { max-width: 1080px; }
    .card.narrow { max-width: 480px; }
    .center { display: flex; align-items: center; justify-content: center; }
    .logo { width: 72px; height: 72px; margin-bottom: .75rem; }
    h1 { color: var(--brand-teal); font-size: 1.4rem; margin: 0 0 1rem; }
    h1.section-heading { margin-top: 2rem; font-size: 1.1rem; }
    h2 { font-size: 1rem; color: var(--text); margin: 1.25rem 0 .4rem; }
    h2.athlete-heading { margin-top: 1.5rem; }
    .subtitle { color: var(--text-muted); font-size: 1rem; margin: 0 0 1.5rem; line-height: 1.5; }
    ul { color: var(--text-muted); font-size: 1rem; padding-left: 1.25rem; margin: 0 0 .5rem; line-height: 1.8; }
    .icon { font-size: 3.5rem; }
    .notice { background: var(--card-tint); border-left: 3px solid var(--brand-green); padding: .85rem 1rem; border-radius: 0 8px 8px 0; font-size: .95rem; color: var(--text-muted); margin: 1.25rem 0; line-height: 1.5; }
    .error { background: #fdecea; color: #c0392b; padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    .success { background: #eafaf1; color: var(--brand-green-dark); padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    label { display: block; font-size: .9rem; color: var(--text-muted); margin-bottom: .4rem; }
    input, select { width: 100%; padding: .75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; font-family: inherit; color: var(--text); }
    .btn { display: inline-block; padding: .85rem 1.5rem; background: var(--brand-green); color: white; text-decoration: none; text-align: center; border-radius: 10px; font-size: 1rem; font-weight: 600; font-family: inherit; border: none; cursor: pointer; }
    .btn:hover { background: var(--brand-green-dark); }
    .btn-danger { background: transparent; color: #c0392b; border: 1px solid #f0d5d2; }
    .btn-danger:hover { background: #fdecea; }
    .btn-strava { background: #FC4C02; width: 100%; display: block; margin-top: 1.5rem; }
    .btn-strava:hover, .btn-strava:active { background: #e03e00; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: .9rem; }
    th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--text-muted); font-weight: 600; }
    tbody tr:nth-child(odd) { background: var(--card-tint); }
    .summary-table th:nth-child(1), .summary-table td:nth-child(1),
    .summary-table th:nth-child(3), .summary-table td:nth-child(3),
    .summary-table th:nth-child(4), .summary-table td:nth-child(4),
    .summary-table th:nth-child(5), .summary-table td:nth-child(5),
    .summary-table th:nth-child(6), .summary-table td:nth-child(6) { white-space: nowrap; }
    .detail-table th:nth-child(2), .detail-table td:nth-child(2),
    .detail-table th:nth-child(3), .detail-table td:nth-child(3),
    .detail-table th:nth-child(4), .detail-table td:nth-child(4),
    .detail-table th:nth-child(5), .detail-table td:nth-child(5),
    .detail-table th:nth-child(6), .detail-table td:nth-child(6) { white-space: nowrap; }
    ul.reports { list-style: none; padding: 0; margin: 1rem 0 0; }
    ul.reports li { padding: .5rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    a { color: var(--brand-teal); }
  </style>
</head>
<body>
  {{Body}}
</body>
</html>
